# =============================================================================
# Site Configuration
# =============================================================================

title = "Eoyc"
description = "Endless Options, Your Chain - A powerful CLI tool for encoding and hashing strings with flexible chain operations"
base_url = "https://eoyc.hahwul.com"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false
per_page = 10

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
limit = 10
sections = []

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false
